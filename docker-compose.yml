services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eshu
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Uncomment to expose PostgreSQL for direct access (e.g. psql, monitoring)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eshu"]
      interval: 2s
      timeout: 3s
      retries: 10

  migrate:
    image: pgvector/pgvector:pg16
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/eshu
    volumes:
      - ./supabase/migrations:/migrations:ro
      - ./scripts/migrate.sh:/migrate.sh:ro
    entrypoint: ["/bin/sh", "/migrate.sh"]
    restart: "no"

  api:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      # Override DATABASE_URL to use the docker-compose internal hostname.
      # The .env.example default already points to db:5432, but this
      # ensures it works even if the user changes .env.
      ESHU_DATABASE_URL: postgresql://postgres:postgres@db:5432/eshu
    ports:
      - "${ESHU_API_PORT:-3100}:${ESHU_API_PORT:-3100}"
    restart: unless-stopped

volumes:
  pgdata:
